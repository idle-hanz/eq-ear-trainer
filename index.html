<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Ear Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .eq-slider { writing-mode: vertical-lr; direction: rtl; height: 160px; accent-color: #22c55e; }
        .band-bar { transition: height 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-headset text-white"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-tighter">EQ Ear Trainer</span>
            </div>
            <a href="https://github.com/idle-hanz/eq-ear-trainer" target="_blank" class="text-sm text-zinc-400 hover:text-white">GitHub</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 pt-12 pb-8 text-center">
        <h1 class="text-6xl font-display font-semibold tracking-tighter mb-4">Train your ears.<br><span class="text-emerald-400">Master EQ.</span></h1>
        <p class="text-xl text-zinc-400">Interactive ear training for audio equalization using real Web Audio API.</p>
    </div>

    <!-- Frequency ID -->
    <div class="max-w-5xl mx-auto px-6 pb-16">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <div class="text-emerald-400 text-sm font-medium">FREQUENCY IDENTIFICATION</div>
                    <div class="text-3xl font-semibold">Which frequency was boosted?</div>
                </div>

                <div class="flex items-center gap-x-3">
                    <!-- Toggle -->
                    <div class="flex items-center bg-zinc-800 rounded-3xl p-1 text-xs">
                        <button onclick="setBandMode('few')" id="btn-few"
                                class="px-4 py-1.5 rounded-[20px] bg-emerald-500 text-white font-medium">Few Bands</button>
                        <button onclick="setBandMode('many')" id="btn-many"
                                class="px-4 py-1.5 rounded-[20px] text-zinc-300 hover:bg-zinc-700">Many Bands</button>
                    </div>

                    <button onclick="startIDRound()" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-3xl flex items-center gap-x-2">
                        <i class="fa-solid fa-play"></i> <span>PLAY</span>
                    </button>
                </div>
            </div>

            <div id="guess-buttons" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-3 mb-6">
                <!-- Populated by JS -->
            </div>

            <div id="id-feedback" class="hidden p-4 rounded-2xl text-sm"></div>
        </div>
    </div>

    <!-- EQ Matching -->
    <div class="max-w-4xl mx-auto px-6 pb-20">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <div class="text-violet-400 text-sm font-medium">EQ MATCHING</div>
                    <div class="text-3xl font-semibold">Match the hidden EQ</div>
                </div>
                <div class="flex gap-x-3">
                    <button onclick="randomizeTarget()" class="px-5 py-3 border border-zinc-700 hover:bg-zinc-800 rounded-3xl text-sm">New Target</button>
                    <button onclick="playReference()" class="px-5 py-3 bg-violet-600 hover:bg-violet-500 text-white font-semibold rounded-3xl flex items-center gap-x-2">
                        <i class="fa-solid fa-play"></i> <span>PLAY</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Reference -->
                <div>
                    <div class="text-sm text-zinc-400 mb-2">REFERENCE (HIDDEN)</div>
                    <div class="h-40 bg-zinc-800 rounded-2xl flex items-center justify-center">
                        <div class="text-center">
                            <i class="fa-solid fa-lock text-4xl text-zinc-600 mb-2"></i>
                            <div class="text-xs text-zinc-500">Target is hidden</div>
                        </div>
                    </div>
                </div>

                <!-- Your EQ -->
                <div>
                    <div class="text-sm text-emerald-400 mb-2">YOUR EQ</div>
                    <div id="sliders" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                    <button onclick="playUserEQ()" class="mt-4 w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-3xl flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-play"></i> <span>PLAY YOUR EQ</span>
                    </button>
                </div>
            </div>

            <button onclick="submitMatch()" class="mt-8 w-full py-4 bg-white text-zinc-950 font-semibold rounded-3xl text-lg">
                SUBMIT MATCH
            </button>

            <div id="match-result" class="hidden mt-6 p-4 bg-zinc-800 rounded-2xl text-center">
                <div class="text-4xl font-display font-semibold text-emerald-400" id="match-accuracy">87</div>
                <div class="text-sm text-zinc-400">% Match Accuracy</div>
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let noiseBuffer;
        let currentSource = null;
        let currentBandMode = 'few';

        // FEW BANDS - like the very first version (spans entire spectrum)
        const fewBands = [
            { name: "Sub Bass", freq: 40, color: "#ef4444" },
            { name: "Bass", freq: 120, color: "#f97316" },
            { name: "Low Mids", freq: 300, color: "#eab308" },
            { name: "Mids", freq: 700, color: "#22c55e" },
            { name: "Upper Mids", freq: 1500, color: "#3b82f6" },
            { name: "Presence", freq: 3500, color: "#a855f7" },
            { name: "Highs", freq: 8000, color: "#ec4899" }
        ];

        // MANY BANDS - like the last version (precise frequencies)
        const manyBands = [
            { name: "80 Hz", freq: 80, color: "#ef4444" },
            { name: "100 Hz", freq: 100, color: "#f97316" },
            { name: "160 Hz", freq: 160, color: "#fb923c" },
            { name: "315 Hz", freq: 315, color: "#eab308" },
            { name: "500 Hz", freq: 500, color: "#84cc16" },
            { name: "800 Hz", freq: 800, color: "#22c55e" },
            { name: "1 kHz", freq: 1000, color: "#10b981" },
            { name: "2 kHz", freq: 2000, color: "#14b8a6" },
            { name: "4 kHz", freq: 4000, color: "#06b6d4" },
            { name: "5 kHz", freq: 5000, color: "#3b82f6" },
            { name: "6 kHz", freq: 6000, color: "#6366f1" },
            { name: "8 kHz", freq: 8000, color: "#a855f7" },
            { name: "10 kHz", freq: 10000, color: "#c026ff" },
            { name: "15 kHz", freq: 15000, color: "#e879f9" }
        ];

        let currentBands = fewBands;

        let idTarget = null;
        let matchTarget = [];
        let userGains = [];

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            noiseBuffer = createNoiseBuffer();
        }

        function createNoiseBuffer() {
            const bufferSize = audioContext.sampleRate * 4;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            return buffer;
        }

        function playWithEQ(gains) {
            if (!audioContext) initAudio();
            if (currentSource) { try { currentSource.stop(); } catch(e){} }

            const source = audioContext.createBufferSource();
            source.buffer = noiseBuffer;

            let node = source;

            const hp = audioContext.createBiquadFilter();
            hp.type = 'highpass'; hp.frequency.value = 30;
            node.connect(hp); node = hp;

            const lp = audioContext.createBiquadFilter();
            lp.type = 'lowpass'; lp.frequency.value = 12000;
            node.connect(lp); node = lp;

            currentBands.forEach((band, i) => {
                const f = audioContext.createBiquadFilter();
                f.type = 'peaking';
                f.frequency.value = band.freq;
                f.gain.value = gains[i] || 0;
                f.Q.value = 2;
                node.connect(f); node = f;
            });

            const master = audioContext.createGain();
            master.gain.value = 0.7;
            node.connect(master);
            master.connect(audioContext.destination);

            source.start();
            currentSource = source;

            if (audioContext.state === 'suspended') audioContext.resume();
        }

        function setBandMode(mode) {
            currentBandMode = mode;

            if (mode === 'few') {
                currentBands = fewBands;
                document.getElementById('btn-few').classList.add('bg-emerald-500', 'text-white');
                document.getElementById('btn-few').classList.remove('text-zinc-300', 'hover:bg-zinc-700');
                document.getElementById('btn-many').classList.remove('bg-emerald-500', 'text-white');
                document.getElementById('btn-many').classList.add('text-zinc-300', 'hover:bg-zinc-700');
            } else {
                currentBands = manyBands;
                document.getElementById('btn-many').classList.add('bg-emerald-500', 'text-white');
                document.getElementById('btn-many').classList.remove('text-zinc-300', 'hover:bg-zinc-700');
                document.getElementById('btn-few').classList.remove('bg-emerald-500', 'text-white');
                document.getElementById('btn-few').classList.add('text-zinc-300', 'hover:bg-zinc-700');
            }

            createGuessButtons();
            createSliders();           // ← Update sliders when toggle changes
            matchTarget = [];          // Reset target when mode changes
            document.getElementById('match-result').classList.add('hidden');
        }

        function createGuessButtons() {
            const container = document.getElementById('guess-buttons');
            container.innerHTML = '';

            currentBands.forEach((band, i) => {
                const btn = document.createElement('button');
                btn.className = `p-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl text-left transition-all`;
                btn.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-sm font-mono" style="background:${band.color}22; color:${band.color}">
                            ${band.freq < 1000 ? band.freq : (band.freq/1000) + 'k'}
                        </div>
                        <div>
                            <div class="font-semibold">${band.name}</div>
                        </div>
                    </div>
                `;
                btn.onclick = () => guessFrequency(i, btn);
                container.appendChild(btn);
            });
        }

        function startIDRound() {
            idTarget = Math.floor(Math.random() * currentBands.length);
            const gains = new Array(currentBands.length).fill(0);
            gains[idTarget] = 10 + Math.random() * 6;
            playWithEQ(gains);
        }

        function guessFrequency(index, btn) {
            const fb = document.getElementById('id-feedback');
            fb.classList.remove('hidden');

            if (index === idTarget) {
                fb.innerHTML = `<div class="text-emerald-400 font-semibold">Correct! It was ${currentBands[index].name}</div>`;
                fb.style.background = 'rgba(16,185,129,0.1)';
                fb.style.border = '1px solid #22c55e';
            } else {
                fb.innerHTML = `<div class="text-rose-400 font-semibold">Wrong. It was ${currentBands[idTarget].name}</div>`;
                fb.style.background = 'rgba(244,63,94,0.1)';
                fb.style.border = '1px solid #f43f5e';
            }

            setTimeout(() => {
                fb.classList.add('hidden');
                idTarget = null;
            }, 1800);
        }

        function createSliders() {
            const container = document.getElementById('sliders');
            container.innerHTML = '';
            userGains = new Array(currentBands.length).fill(0);

            currentBands.forEach((band, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-x-4';
                div.innerHTML = `
                    <div class="w-28 text-sm">${band.name}</div>
                    <input type="range" min="-12" max="12" step="0.5" value="0" class="flex-1 accent-emerald-500" 
                           oninput="userGains[${i}] = parseFloat(this.value); updateSliderVisual(${i}, this.value)">
                    <div class="w-14 text-right font-mono text-sm" id="val-${i}">0 dB</div>
                `;
                container.appendChild(div);
            });
        }

        function updateSliderVisual(i, val) {
            document.getElementById(`val-${i}`).textContent = (parseFloat(val) > 0 ? '+' : '') + parseFloat(val).toFixed(1) + ' dB';
        }

        function randomizeTarget() {
            matchTarget = currentBands.map(() => (Math.random() * 16 - 8).toFixed(1) * 1);
            userGains = new Array(currentBands.length).fill(0);

            const inputs = document.querySelectorAll('#sliders input');
            inputs.forEach((input, i) => {
                input.value = 0;
                document.getElementById(`val-${i}`).textContent = '0 dB';
            });

            document.getElementById('match-result').classList.add('hidden');
        }

        function playReference() {
            if (!matchTarget.length) {
                alert('Click "New Target" first');
                return;
            }
            playWithEQ(matchTarget);
        }

        function playUserEQ() {
            playWithEQ(userGains);
        }

        function submitMatch() {
            if (!matchTarget.length) {
                alert('Click "New Target" first');
                return;
            }

            let diff = 0;
            for (let i = 0; i < currentBands.length; i++) {
                diff += Math.abs(matchTarget[i] - userGains[i]);
            }
            const accuracy = Math.max(0, Math.round(100 - (diff / currentBands.length) * 6));

            const result = document.getElementById('match-result');
            result.classList.remove('hidden');
            result.innerHTML = `
                <div class="text-5xl font-display font-semibold text-emerald-400">${accuracy}</div>
                <div class="text-sm text-zinc-400">% Match Accuracy</div>
            `;
        }

        function initializeApp() {
            createGuessButtons();
            createSliders();

            // Default to few bands
            document.getElementById('btn-few').classList.add('bg-emerald-500', 'text-white');

            console.log('%c[EQ Ear Trainer] EQ Matching now respects Few/Many toggle', 'color:#22c55e');
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
